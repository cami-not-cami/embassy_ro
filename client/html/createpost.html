<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../css/override.css">
    <title>Post</title>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">
            <img src="../images/logo.png" alt="" width="80" height="80" class="d-inline-block align-text-top">
        </a>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="?lang=ro">RO</a>
                </li>
                <li>
                    <div class="border-start"></div>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="?lang=de">DE</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">{{home}}</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">{{contact}}</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">{{romania}}</a>
                </li>
            </ul>
        </div>
        <form class="d-flex" role="search">
                <span class="input-group-text" id="addon-wrapping">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                      <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                    </svg>
                </span>
            <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
            <button class="btn btn-outline-success" type="submit">{{search}}</button>
        </form>
        <div class="ms-3">
            <button id="btnLogin" type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalLogin">Login</button>
        </div>
        <button class="btn" data-bs-toggle="offcanvas" data-bs-target="#menu" >
            <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" fill="currentColor" class="bi bi-list" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5"/>
            </svg>
        </button>
    </div>

</nav>

<header class="masthead" style="background-color: #98768e; padding-top: 3rem; padding-bottom: 3rem;"></header>

<div class="container-fluid mt-5">
    <div class="row">
        <div class="col-2"></div>
        <div class="col">
            <div class="card mt-3 ms-3  rounded-4" style="background-color: #f5f0f5;">
                <div class="card-body">
                    <h4 class="ms-1">
                        {{editpost}}
                    </h4>
                    <form>
                        <div class="mb-3 mt-3">
                            <input id="inputTitle" placeholder="{{title}}" type="text" class="form-control">
                        </div>
                        <div class="mb-3">
                            <textarea rows="5" id="inputContent" placeholder="{{content}}" type="text" class="form-control"></textarea>
                        </div>
                    </form>
                    <div class="mb-3">
                        <label for="formFile" class="form-label">{{imagehere}}</label>
                        <input class="form-control" type="file" id="formFile">
                    </div>
                    <div class="d-flex justify-content-end">

                        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalPost">{{post}}</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-2"></div>
    </div>
</div>

<script type="module" src="../js/index.js"></script>
</body>
</html>
